<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truco Venezolano 🇻🇪</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mesa-truco">
        <div class="zona-ia">
            <div id="ia-cartas" class="contenedor-cartas">
                <div class="carta-reverso"></div>
                <div class="carta-reverso"></div>
                <div class="carta-reverso"></div>
            </div>
        </div>

        <div class="zona-central">
            <button id="btn-repartir" class="btn-principal">REPARTIR MESA</button>
            <div id="tapete-batalla" class="tapete-batalla">
                </div>
        </div>

        <div class="zona-inferior">
            <div id="mano-container" class="contenedor-cartas">
                <div class="indicador-inicio">Dale a 'Repartir Mesa' para recibir cartas</div>
            </div>

            <div class="esquina-mazo">
                <div class="deck-stack">
                    <div class="carta-reverso mazo-base"></div>
                    <div id="vira-display" class="carta vira-volteada"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
